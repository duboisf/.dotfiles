# cc-queue configuration for kitty

# Enable remote control for cross-window jumping
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# Keyboard shortcuts
map alt+q launch --type=overlay --title cc-queue /usr/bin/zsh -il -c 'exec cc-queue --full-tab'
map alt+j launch --type=overlay --title cc-queue /usr/bin/zsh -il -c 'exec cc-queue --full-tab first'
